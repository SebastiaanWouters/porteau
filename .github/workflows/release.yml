name: Release alpha

on:
  push:
    tags: ['v*-alpha.*']

# Least privilege at workflow scope; jobs elevate only what they need.
permissions: {}

concurrency:
  group: porteau-release
  cancel-in-progress: false

jobs:
  package-preflight:
    name: Package preflight
    if: github.repository == 'SebastiaanWouters/porteau'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
      checks: read
      actions: write
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@8a7496fd44e8a1b0a88a7459e36213b2fefc1d15 # v1
        with:
          node-version: '24'
          cache: false
          run-install: false
      - name: Validate release tag and source
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/release-validate-tag.mjs
      - run: vp install --frozen-lockfile
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
      - name: Verify generated installer
        run: |
          vp exec tsx scripts/generate-install-script.ts "$RUNNER_TEMP/install.sh"
          cmp install.sh "$RUNNER_TEMP/install.sh"
      - name: Verify and build
        run: bash scripts/check-shell.sh && vp check && vp test && vp pack
      - name: Validate exact package artifact
        run: |
          mkdir -p "$RUNNER_TEMP/release"
          vp exec node scripts/package-smoke.mjs "$RUNNER_TEMP/release/porteau.tgz"
          cp install.sh "$RUNNER_TEMP/release/install.sh"
          npm publish "$RUNNER_TEMP/release/porteau.tgz" \
            --dry-run --ignore-scripts --access public --tag next
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: porteau-release-candidate
          path: ${{ runner.temp }}/release/*
          if-no-files-found: error
          retention-days: 7

  npm-publish:
    name: Publish npm package
    if: github.repository == 'SebastiaanWouters/porteau'
    needs: [package-preflight]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: porteau-release-candidate
          path: candidate
      - name: Publish or verify the exact package
        run: bash scripts/release-publish-npm.sh candidate/porteau.tgz

  registry-installer:
    name: Published installer
    if: github.repository == 'SebastiaanWouters/porteau'
    needs: npm-publish
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PORTEAU_COMPOSE_PROJECT: porteau-published-${{ github.run_id }}-${{ github.run_attempt }}
      PORTEAU_RELEASE_TEST: '1'
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - run: bash scripts/verify-external.sh ubuntu-2404

  github-release:
    name: Publish GitHub prerelease
    if: github.repository == 'SebastiaanWouters/porteau'
    needs: registry-installer
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          package-manager-cache: false
      - uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7
        with:
          name: porteau-release-candidate
          path: candidate
      - name: Create or verify the prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/release-publish-github.sh candidate

  public-url-smoke:
    name: Public installer smoke
    if: github.repository == 'SebastiaanWouters/porteau'
    needs: github-release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      PORTEAU_COMPOSE_PROJECT: porteau-public-${{ github.run_id }}-${{ github.run_attempt }}
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Verify and run the public release installer
        run: |
          set -Eeuo pipefail
          url="https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/install.sh"
          curl --proto '=https' --tlsv1.2 -fsSL "$url" --output "$RUNNER_TEMP/install.sh"
          cmp install.sh "$RUNNER_TEMP/install.sh"
          PORTEAU_INSTALL_URL="$url" bash scripts/verify-external.sh ubuntu-2404
