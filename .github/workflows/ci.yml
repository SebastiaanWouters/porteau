name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        node: ['22.18.0', '24']
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: voidzero-dev/setup-vp@8a7496fd44e8a1b0a88a7459e36213b2fefc1d15 # v1
        with:
          node-version: ${{ matrix.node }}
          cache: true
          run-install: false
      - run: vp install --frozen-lockfile
      - name: Run the local verification suite
        run: vp run verify

  qualify:
    name: External qualification
    uses: ./.github/workflows/qualify-external.yml
    with:
      compose_prefix: porteau-${{ github.run_id }}-${{ github.run_attempt }}
